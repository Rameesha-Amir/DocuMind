<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind — AI Document Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c28;
            --border: #2a2a3d;
            --accent: #7c6cfc;
            --accent2: #a78bfa;
            --text: #e8e8f0;
            --muted: #6b6b85;
            --user-bubble: #7c6cfc;
            --bot-bubble: #1c1c28;
            --success: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,108,252,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,108,252,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            width: 100%;
            max-width: 820px;
            height: 88vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #7c6cfc, #a78bfa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span { color: var(--accent2); }

        .status-pill {
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: var(--surface);
        }

        .status-pill.ready {
            border-color: var(--success);
            color: var(--success);
        }

        /* Upload zone */
        .upload-zone {
            border: 1.5px dashed var(--border);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: var(--surface);
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(124,108,252,0.05);
        }

        .upload-zone.has-file {
            border-style: solid;
            border-color: var(--accent);
            background: rgba(124,108,252,0.08);
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-content {
            display: flex;
            align-items: center;
            gap: 14px;
            pointer-events: none;
        }

        .upload-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .upload-text h3 {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .upload-text p {
            font-size: 12px;
            color: var(--muted);
        }

        .file-name {
            font-size: 12px;
            color: var(--accent2);
            font-weight: 500;
            margin-top: 4px;
        }

        /* API Key input */
        .api-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .api-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .api-input::placeholder { color: var(--muted); }
        .api-input:focus { border-color: var(--accent); }

        .api-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .api-btn:hover { opacity: 0.85; }

        /* Chat box */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 4px 2px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.65;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: var(--text);
        }

        .user-message {
            background: var(--user-bubble);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: white;
        }

        .msg-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: var(--muted);
        }

        .user-message .msg-label { color: rgba(255,255,255,0.6); }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 14px 16px;
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Input area */
        .input-area {
            display: flex;
            gap: 10px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            margin-top: 14px;
        }

        #user-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 18px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
        }

        #user-input::placeholder { color: var(--muted); }
        #user-input:focus { border-color: var(--accent); }

        #send-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px 22px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }

        #send-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        #send-btn:active { transform: translateY(0); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Quick buttons */
        .quick-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding-top: 10px;
        }

        .quick-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 13px;
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent2);
            background: rgba(124,108,252,0.08);
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            color: var(--muted);
        }

        .empty-state .big-icon { font-size: 42px; margin-bottom: 6px; }
        .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--text); }
        .empty-state p { font-size: 13px; max-width: 300px; line-height: 1.6; }

        @media (max-width: 600px) {
            .app { height: 95vh; }
            .message { max-width: 88%; }
            .logo-text { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">Docu<span>Mind</span></div>
        </div>
        <div class="status-pill" id="status-pill">No document</div>
    </div>



    <!-- Upload Zone -->
    <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".pdf" onchange="handleFile(event)" />
        <div class="upload-content">
            <div class="upload-icon">📄</div>
            <div class="upload-text">
                <h3>Upload your PDF</h3>
                <p>Click to browse or drag & drop — any PDF document</p>
                <div class="file-name" id="file-name-display"></div>
            </div>
        </div>
    </div>

    <!-- Chat Box -->
    <div class="chat-box" id="chat-box">
        <div class="empty-state" id="empty-state">
            <div class="big-icon">💬</div>
            <h3>Ready to chat with your document</h3>
            <p>Add your API key, upload a PDF, then ask anything about it</p>
        </div>
    </div>

    <!-- Quick Buttons -->
    <div class="quick-btns">
        <button class="quick-btn" onclick="quickAsk('Give me a complete summary of this document')">📋 Summary</button>
        <button class="quick-btn" onclick="quickAsk('What are the main key points?')">🔑 Key Points</button>
        <button class="quick-btn" onclick="quickAsk('What is this document about?')">🔍 Overview</button>
        <button class="quick-btn" onclick="quickAsk('List important topics covered in this document')">📚 Topics</button>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask anything about your document..." onkeypress="handleKey(event)" />
        <button id="send-btn" onclick="sendMessage()">Send →</button>
    </div>

</div>

<script>
    // ---- CONFIG ----
    let GEMINI_API_KEY = 'AIzaSyDs3qnDxRlTG512yO5Fm7bYJ5HX5AX_85U';
    let documentText = '';
    let isReady = false;

    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ---- API KEY (hardcoded) ----

    // ---- FILE HANDLER ----
    async function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        document.getElementById('file-name-display').textContent = file.name;
        document.getElementById('upload-zone').classList.add('has-file');
        document.getElementById('status-pill').textContent = 'Reading...';
        document.getElementById('status-pill').className = 'status-pill';

        addMessage('bot', `📄 Reading "${file.name}"... please wait.`);

        try {
            const text = await extractTextFromPDF(file);
            documentText = text;
            isReady = true;

            document.getElementById('status-pill').textContent = '✓ Ready';
            document.getElementById('status-pill').className = 'status-pill ready';

            addMessage('bot', `✅ Document loaded successfully!\n\n📊 Extracted ${text.length} characters from "${file.name}".\n\nDocument is ready! Ask me anything about it.`);
        } catch (err) {
            addMessage('bot', '❌ Error reading PDF. Please try another file.');
            console.error(err);
        }
    }

    // ---- PDF TEXT EXTRACTION ----
    async function extractTextFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = '';

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const pageText = content.items.map(item => item.str).join(' ');
            fullText += `\n[Page ${i}]\n${pageText}\n`;
        }

        return fullText;
    }

    // ---- SEND MESSAGE ----
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const msg = input.value.trim();
        if (!msg) return;

        if (!GEMINI_API_KEY) {
            addMessage('bot', '⚠️ Pehle apni API key daalo upar wale box mein!');
            return;
        }

        if (!isReady || !documentText) {
            addMessage('bot', '⚠️ Pehle ek PDF upload karo — phir sawaal poochho!');
            return;
        }

        addMessage('user', msg);
        input.value = '';

        const typing = showTyping();

        try {
            const reply = await callGemini(msg);
            removeTyping(typing);
            addMessage('bot', reply);
        } catch (err) {
            removeTyping(typing);
            addMessage('bot', '❌ Error: ' + err.message);
        }
    }

    // ---- GEMINI API CALL ----
    async function callGemini(userQuestion) {
        const prompt = `You are DocuMind, an AI document assistant. A user has uploaded a PDF document. Based ONLY on the document content below, answer the user's question clearly and helpfully. If the answer is not in the document, say so honestly.

DOCUMENT CONTENT:
${documentText.substring(0, 12000)}

USER QUESTION: ${userQuestion}

Answer in a clear, helpful way. Use bullet points or structure when needed.`;

        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.3, maxOutputTokens: 1024 }
                })
            }
        );

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || 'API call failed');
        }

        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
    }

    // ---- UI HELPERS ----
    function addMessage(sender, text) {
        const empty = document.getElementById('empty-state');
        if (empty) empty.remove();

        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        div.innerHTML = `<div class="msg-label">${sender === 'bot' ? '🧠 DocuMind' : '👤 You'}</div>${escapeHtml(text)}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function showTyping() {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'typing';
        div.innerHTML = '<span></span><span></span><span></span>';
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
    }

    function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
    function quickAsk(q) {
        document.getElementById('user-input').value = q;
        sendMessage();
    }
</script>
</body>
</html>
